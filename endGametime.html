<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Over</title>
    <link rel="stylesheet" href="style/style.css">
    <style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background-color: #1a1a1a;
  margin: 0;
  font-family: 'Courier New', Courier, monospace;
  color: #00ff00; /* Neonově zelená pro text */
}

.game-over-container {
  text-align: center;
}

h1 {
  font-size: 3em;
  color: #ff0000; /* Červená pro nadpis */
  text-shadow: 2px 2px #000000; /* Stín pro text */
}

p {
  font-size: 1.5em;
  margin: 20px 0;
}

button {
  background-color: #00ff00; /* Neonově zelená */
  color: #000000; /* Černý text */
  border: 2px solid #00ff00; /* Neonově zelený okraj */
  padding: 10px 20px;
  font-size: 1.5em;
  cursor: pointer;
  transition: background-color 0.3s ease, transform 0.3s ease;
  border-radius: 5px;
  text-shadow: 1px 1px #000000; /* Stín pro text */
}

button:hover {
  background-color: #00cc00; /* Světlejší neon při hoveru */
  transform: scale(1.1); /* Zvýraznění při hoveru */
}

button:active {
  background-color: #009900; /* Tmavší neon při kliknutí */
  transform: scale(0.9); /* Zmenšení při kliknutí */
}
    </style>
</head>
<body>
    <div class="game-over-container">
        <h1>Game over</h1>
        <p>Došel ti čas a byl si zabit...</p>
        <button onclick="window.location.href='index.html'">Menu</button>
    </div>
</body>
</html>
