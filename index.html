<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydra GAME</title>
    <style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #1a1a1a;
    margin: 0;
    font-family: 'Courier New', Courier, monospace;
    color: #00ff00; /* Neonově zelená pro text */
}

.gameBtn {
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

#startBtn {
    background-color: #00ff00; 
    color: #000000; /* Černý text */
    border: 2px solid #00ff00; /* Neonově zelený okraj */
    padding: 15px 30px;
    font-size: 1.5em;
    cursor: pointer;
    transition: background-color 0.3s ease, transform 0.3s ease;
    border-radius: 5px;
    text-shadow: 1px 1px #000000; /* Stín pro text */
}

#startBtn:hover {
    transform: scale(1.1); /* Zvýraznění při hoveru */
}

#startBtn:active {
    background-color: #009900; 
    transform: scale(0.9); 
}

.modal {
    display: none; /* Skryté ve výchozím nastavení */
    position: fixed; /* Zůstat na místě */
    z-index: 1000; /* Zůstat na vrcholu */
    left: 0;
    top: 0;
    width: 100%; /* Plná šířka */
    height: 100%; /* Plná výška */
    overflow: auto; /* Povolit posouvání, pokud je obsah příliš velký */
    background-color: rgb(0,0,0); /* Fallback barva */
    background-color: rgba(0,0,0,0.4); /* Černé pozadí s průhledností */
}

.modal-content {
    background-color: #fefefe;
    margin: 15% auto; /* 15% od vrchu a centrované */
    padding: 20px;
    border: 1px solid #888;
    width: 80%; /* Šířka modalu */
    text-align: center;
}

.close {
    color: #aaa;
    float: right;
    font-size: 28px;
    font-weight: bold;
}

.close:hover,
.close:focus {
    color: black;
    text-decoration: none;
    cursor: pointer;
}

button {
    background-color: #00ff00; /* Neonově zelená */
    color: #000000; /* Černý text */
    border: 2px solid #00ff00; /* Neonově zelený okraj */
    padding: 10px 20px;
    font-size: 1em;
    cursor: pointer;
    transition: background-color 0.3s ease, transform 0.3s ease;
    border-radius: 5px;
    margin: 10px;
    text-shadow: 1px 1px #000000; /* Stín pro text */
}

button:hover {
    background-color: #00cc00; /* Světlejší neon při hoveru */
    transform: scale(1.1); /* Zvýraznění při hoveru */
}

button:active {
    background-color: #009900; /* Tmavší neon při kliknutí */
    transform: scale(0.9); /* Zmenšení při kliknutí */
}

.settings {
    padding: 20px;
    background-color: #333;
    color: #fff;
    border-radius: 10px;
    margin: 20px;
}

.settings h2 {
    color: #00ff00; /* Neonově zelená */
}

.settings label {
    display: block;
    margin: 10px 0 5px;
}

.settings input[type="checkbox"],
.settings input[type="range"],
.settings select {
    margin-bottom: 10px;
}
    </style>
</head>
<body>
  <div class="gameBtn">
    <button id="startBtn" onclick="startGame()">Start Game</button>
    <button id="startBtn" onclick="openSettings()">Settings</button>
  </div>

  <!-- Modal pro nastavení -->
  <div id="settingsModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeSettings()">&times;</span>
      <div class="settings">
        <h2>Settings</h2>
        <label for="volume">Volume:</label>
        <input type="range" id="volume" min="0" max="100" value="50" oninput="adjustVolume(this.value)">
        <button onclick="testVolume()">Test Volume</button><br>
        
        <label for="brightness">Brightness:</label>
        <input type="range" id="brightness" min="0" max="100" value="50" oninput="adjustBrightness(this.value)"><br>
        
        <label for="difficulty">Difficulty:</label>
        <select id="difficulty" onchange="changeDifficulty(this.value)">
            <option value="normal">Normal (15 min)</option>
            <option value="hard">Hard (10 min)</option>
            <option value="extreme">Extreme (5 min)</option>
        </select>
      </div>
    </div>
  </div>

  <script src="script/script.js"></script>
</body>
</html>
